version: "3.9"

services:

  mariadb:
    image: mariadb:11.4
    container_name: moodle-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: superrootpass
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodle
      MARIADB_PASSWORD: moodlepass
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - moodle-net

  moodle:
    image: moodlehq/moodle-php-apache:8.3
    container_name: moodle
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - "8080:80"
    volumes:
      - ./moodle-code:/var/www/html
      - moodle_data:/var/www/moodledata
    environment:
      MOODLE_DOCKER_PHPUNIT: 0
    networks:
      - moodle-net
      - proxy
    command: >
      bash -c "
        if [ ! -d vendor ]; then
          php -r 'copy(\"https://getcomposer.org/installer\", \"composer-setup.php\");' && \
          php composer-setup.php && \
          php -r 'unlink(\"composer-setup.php\");' && \
          php composer.phar install --no-dev --classmap-authoritative;
        fi && apache2-foreground
      "

  cron:
    image: moodlehq/moodle-php-apache:8.3
    container_name: moodle-cron
    restart: unless-stopped
    depends_on:
      - moodle
    volumes:
      - ./moodle-code:/var/www/html
      - moodle_data:/var/www/moodledata
    networks:
      - moodle-net
    entrypoint: >
      bash -c "while true; do php /var/www/html/admin/cli/cron.php; sleep 60; done"

volumes:
  mariadb_data:
  moodle_data:

networks:
  moodle-net:
    driver: bridge
  proxy:
    external: true
